services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        PORT: ${PORT:-4000}
    image: mini-project:local
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
    restart: unless-stopped
